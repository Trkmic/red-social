<div class="feed-background">

    <div class="feed-container">
  
      <h2 class="feed-title mb-4 text-center">Publicaciones</h2>
  
      <!-- Formulario nueva publicación -->
      <form [formGroup]="formPublicacion" (ngSubmit)="crearPublicacion()" class="new-post-form mb-4">
        <input formControlName="titulo" type="text" class="form-control" placeholder="Título" appResaltarInvalido>
        <textarea formControlName="mensaje" class="form-control" placeholder="Mensaje"></textarea>
        <input type="file" (change)="onFileChange($event)" class="form-control" appResaltarInvalido>
        <button type="submit" class="btn post-btn" [attr.disabled]="loading ? true : null" appClickControl>
          {{ loading ? 'Publicando...' : 'Publicar' }}
        </button>
      </form>
  
      <!-- Lista de publicaciones -->
      <div class="posts-feed">
        <div class="post-card" *ngFor="let post of publicaciones">
  
          <!-- Usuario -->
          <div class="post-header d-flex align-items-center gap-3 mb-2">
            <img src="https://i.pravatar.cc/50?u={{post.usuarioId._id}}" 
                 alt="Foto de {{ post.usuarioId.username }}" class="rounded-circle">
            <div>
              <strong>{{ post.usuarioId.username | MayusculaLetra }}</strong>
              <p class="time mb-0 small">{{ post.createdAt | FormateoHora }}</p>
            </div>
          </div>
  
          <!-- Mensaje -->
          <p class="post-message">{{ post.mensaje | limitadorCaracteres }}</p>
  
          <!-- Imagen -->
          <img *ngIf="post.imagen" [src]="post.imagen" alt="Foto de publicación" class="post-img mb-2 rounded">
  
          <!-- Acciones -->
          <div class="actions d-flex gap-2 mt-2">
            <button class="btn btn-sm"
                    [ngClass]="{'btn-primary': post.likes.includes(usuarioLogueado?._id),
                                'btn-outline-primary': !post.likes.includes(usuarioLogueado?._id)}"
                    (click)="toggleLike(post)">
              ❤️ {{ post.likes.length }}
            </button>
            <button class="btn btn-outline-secondary btn-sm">💬 Comentar</button>
          </div>
  
        </div>
      </div>
  
    </div>
  </div>
