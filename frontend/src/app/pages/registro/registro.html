<div class="app-background">
  <div class="container">
    <div class="container d-flex justify-content-center align-items-center my-0">
      <div class="registro-container card p-4 shadow border-0 w-100" style="max-width: 650px;">
        
        <h1 class="text-center text-primary fw-bold mb-4">Registro</h1>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" enctype="multipart/form-data" novalidate>

          <div class="row g-3">
            
            <!-- NOMBRE -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Nombre</label>
              <input type="text" class="form-control" formControlName="nombre" placeholder="Nombre" appAutofocus appResaltarInvalido>
            </div>

            <!-- APELLIDO -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Apellido</label>
              <input type="text" class="form-control" formControlName="apellido" placeholder="Apellido" appResaltarInvalido>
            </div>

            <!-- EMAIL -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Email</label>
              <input type="email" class="form-control" formControlName="email" placeholder="Correo electrónico" appResaltarInvalido>
            </div>

            <!-- USUARIO -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Usuario</label>
              <input type="text" class="form-control" formControlName="nombreUsuario" placeholder="Nombre de usuario" appResaltarInvalido>
            </div>

            <!-- CONTRASEÑA -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Contraseña</label>
              <input type="password" class="form-control" formControlName="password" placeholder="Contraseña" appResaltarInvalido>
              <div class="text-danger small mt-1"
                  *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid">
                La contraseña debe tener al menos 6 caracteres.
              </div>
            </div>

            <!-- REPETIR CONTRASEÑA -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Repetir Contraseña</label>
              <input type="password" class="form-control" formControlName="repeatPassword" placeholder="Confirmar contraseña" appResaltarInvalido>
            </div>

            <!-- FECHA DE NACIMIENTO -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Fecha de Nacimiento</label>
              <input type="date" class="form-control" formControlName="fechaNacimiento" appResaltarInvalido>
            </div>

            <!-- PERFIL -->
            <div class="col-md-6">
              <label class="form-label fw-semibold">Perfil</label>
              <select class="form-select" formControlName="perfil">
                <option value="usuario">Usuario</option>
                <option value="administrador">Administrador</option>
              </select>
            </div>

            <!-- DESCRIPCIÓN -->
            <div class="col-12">
              <label class="form-label fw-semibold">Descripción</label>
              <textarea class="form-control" formControlName="descripcion" placeholder="Breve descripción personal" rows="3"></textarea>
            </div>

            <!-- FOTO DE PERFIL -->
            <div class="col-12">
              <label class="form-label fw-semibold">Foto de Perfil</label>
              <input type="file" class="form-control" accept="image/png, image/jpeg, image/jpg, image/webp" (change)="onFileChange($event)">
              <small class="text-muted">Formatos permitidos: JPG, PNG, WEBP</small>

              <div *ngIf="previewImage" class="mt-3 text-center">
                <img [src]="previewImage"
                    alt="Vista previa"
                    class="rounded-circle shadow-sm border"
                    width="120"
                    height="120"
                    style="object-fit: cover;">
              </div>
            </div>

          </div>

          <!-- BOTÓN REGISTRAR -->
          
          <!-- BOTÓN REGISTRAR -->
          <button type="submit"
                  class="btn btn-primary w-100 fw-bold mt-4 d-flex justify-content-center align-items-center"
                  [disabled]="loading || registerForm.invalid">

            <span *ngIf="!loading">Registrarse</span>
            
            <span *ngIf="loading" class="d-flex align-items-center gap-2">
              <div class="spinner-border spinner-border-sm text-light" role="status">
                <span class="visually-hidden">Loading...</span>
              </div>
              Registrando...
            </span>
          </button>

        </form>
      </div>
    </div>
  </div>    
</div>
