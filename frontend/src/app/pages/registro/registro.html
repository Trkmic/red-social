<div class="container registro-container">
    <h1>Registro</h1>
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" enctype="multipart/form-data">
      <div class="form-grid">
        <div>
          <label>Nombre</label>
          <input type="text" formControlName="nombre" placeholder="Nombre">
        </div>
  
        <div>
          <label>Apellido</label>
          <input type="text" formControlName="apellido" placeholder="Apellido">
        </div>
  
        <div>
          <label>Email</label>
          <input type="email" formControlName="email" placeholder="Email">
        </div>
  
        <div>
          <label>Usuario</label>
          <input type="text" formControlName="username" placeholder="Nombre de usuario">
        </div>
  
        <div>
          <label>Contraseña</label>
          <input type="password" formControlName="password" placeholder="Contraseña">
          <div class="error" *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid">
            La contraseña debe tener al menos 8 caracteres, una mayúscula y un número.
          </div>
        </div>
  
        <div>
          <label>Confirmar Contraseña</label>
          <input type="password" formControlName="confirmPassword" placeholder="Confirmar Contraseña">
        </div>
  
        <div>
          <label>Fecha de Nacimiento</label>
          <input type="date" formControlName="fechaNacimiento">
        </div>
  
        <div>
          <label>Descripción</label>
          <textarea formControlName="descripcion" placeholder="Descripción breve"></textarea>
        </div>
  
        <div>
          <label>Perfil</label>
          <select formControlName="perfil">
            <option value="usuario">Usuario</option>
            <option value="administrador">Administrador</option>
          </select>
        </div>
  
        <div>
          <label>Foto de Perfil</label>
          <input type="file" (change)="onFileChange($event)">
        </div>
      </div>
  
      <button type="submit" [disabled]="registerForm.invalid">Registrarse</button>
    </form>
</div>
