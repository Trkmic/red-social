<div class="container d-flex justify-content-center my-5">
  <div class="registro-container card p-4 shadow-sm border-0 w-100">

    <h1 class="text-center text-primary fw-bold mb-4">Registro</h1>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" enctype="multipart/form-data">

      <div class="row g-3">

        <div class="col-md-6">
          <label class="form-label fw-semibold">Nombre</label>
          <input type="text" class="form-control" formControlName="nombre" placeholder="Nombre">
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Apellido</label>
          <input type="text" class="form-control" formControlName="apellido" placeholder="Apellido">
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Email</label>
          <input type="email" class="form-control" formControlName="email" placeholder="Email">
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Usuario</label>
          <input type="text" class="form-control" formControlName="username" placeholder="Nombre de usuario">
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Contraseña</label>
          <input type="password" class="form-control" formControlName="password" placeholder="Contraseña">
          <div class="text-danger small mt-1"
               *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid">
            La contraseña debe tener al menos 8 caracteres, una mayúscula y un número.
          </div>
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Confirmar Contraseña</label>
          <input type="password" class="form-control" formControlName="confirmPassword" placeholder="Confirmar Contraseña">
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Fecha de Nacimiento</label>
          <input type="date" class="form-control" formControlName="fechaNacimiento">
        </div>

        <div class="col-md-6">
          <label class="form-label fw-semibold">Perfil</label>
          <select class="form-select" formControlName="perfil">
            <option value="usuario">Usuario</option>
            <option value="administrador">Administrador</option>
          </select>
        </div>

        <div class="col-12">
          <label class="form-label fw-semibold">Descripción</label>
          <textarea class="form-control" formControlName="descripcion" placeholder="Descripción breve" rows="3"></textarea>
        </div>

        <div class="col-12">
          <label class="form-label fw-semibold">Foto de Perfil</label>
          <input type="file" class="form-control" (change)="onFileChange($event)">
        </div>

      </div>

      <button type="submit" class="btn w-100 text-white fw-bold mt-4 register-btn"
              [disabled]="registerForm.invalid">Registrarse</button>
    </form>
  </div>
</div>
